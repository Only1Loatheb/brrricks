pre-push:
  commands:
    - |
      if git merge-base --is-ancestor HEAD @{u}; then
        echo "Already pushed"
        exit 1
      else
        echo "We have new commit to work with"
      fi
    - |
      if [ -z "$(git status --porcelain)" ]; then
        echo "All changes in files known to git are committed"
      else
        echo "Committing local changes"
        git add -A && git commit --amend --no-edit
        exit 1
      fi
    - cargo check --workspace --all-targets
    - cargo fmt --package bricks type_process_builder qrios_api_process_runner qrios_api_process_entry
    - cargo fix --workspace --all-targets --all-features --allow-dirty
    - cargo clippy --fix --allow-dirty --all-targets --all-features
    - |
      if [ -z "$(git status --porcelain)" ]; then
        echo "All changes in files known to git are committed"
      else
        echo "Committing automated fixes"
        git add -A && git commit --amend --no-edit
        exit 1
      fi
    - cargo clippy --all-targets --all-features -- -D warnings -W clippy::all
    - |
      cargo llvm-cov \
      --fail-under-regions 48 --fail-under-functions 66 --fail-under-lines 53 \
      --package type_process_builder
    - |
      cargo llvm-cov \
      --fail-under-regions 0 --fail-under-functions 0 --fail-under-lines 0 \
      --package qrios_api_process_runner --package qrios_api_process_entry
