pre-push:
  commands:
    - |
      if git merge-base --is-ancestor HEAD @{u}; then
        echo "Already pushed"
        exit 1
      else
        echo "We have new commit to work with"
      fi
    - |
      if [ -z "$(git status --porcelain)" ]; then
        echo "All changes in files known to git are committed"
      else
        echo "Committing local changes"
        git add -A && git commit --amend --no-edit
        exit 1
      fi
    - cargo check --all-targets -p bricks -p type_process_builder -p qrios_api_process_runner -p qrios_api_process_entry
    - cargo fmt -p bricks -p type_process_builder -p qrios_api_process_runner -p qrios_api_process_entry
    - cargo fix --all-targets --all-features --allow-dirty -p bricks -p type_process_builder -p qrios_api_process_runner -p qrios_api_process_entry
    - cargo clippy --fix --allow-dirty --all-targets --all-features -p bricks -p type_process_builder -p qrios_api_process_runner -p qrios_api_process_entry
    - |
      if [ -z "$(git status --porcelain)" ]; then
        echo "Automated fixes already applied"
      else
        echo "Committing automated fixes"
        git add -A && git commit --amend --no-edit
        exit 1
      fi
    - |
      cargo clippy --all-targets --all-features -p bricks -p type_process_builder -p qrios_api_process_runner -p qrios_api_process_entry \
      -- -D warnings -W clippy::all
    - |
      cargo +nightly llvm-cov --package type_process_builder --no-clean \
      --fail-under-regions 60 --fail-under-functions 81 --fail-under-lines 68
    - |
      cargo +nightly llvm-cov --package qrios_api_process_runner --package qrios_api_process_entry --no-clean \
      --fail-under-regions 0 --fail-under-functions 0 --fail-under-lines 0
    - cargo xtask
    - |
      if [ -z "$(git status --porcelain)" ]; then
        echo "All autogenerated files were updated"
      else
        echo "Committing autogenerated files"
        git add -A && git commit --amend --no-edit
        exit 1
      fi
